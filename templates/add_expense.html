{% extends "base.html" %}

{% block title %}Add Expense{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Add New Expense</h2>

    <form method="POST" class="mt-4" enctype="multipart/form-data">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="date" class="form-label fw-bold">Date</label>
                <input type="date" class="form-control" id="date" name="date"
                       value="{{ today }}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label for="amount" class="form-label fw-bold">Total Amount ($)</label>
                <input type="number" step="0.01" class="form-control" id="amount" name="amount"
                       placeholder="0.00" required autofocus oninput="calcTax()">
            </div>
        </div>

        <!-- Tax Section -->
        <div class="row">
            <div class="col-md-4 mb-3">
                <label for="tax_rate_id" class="form-label fw-bold">Tax Rate</label>
                <select class="form-control" id="tax_rate_id" name="tax_rate_id" onchange="calcTax()">
                    <option value="">No Tax</option>
                    {% for rate in tax_rates %}
                    <option value="{{ rate.id }}" data-rate="{{ rate.rate }}">{{ rate.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4 mb-3" id="taxBreakdown" style="display:none;">
                <label class="form-label fw-bold">Subtotal</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" step="0.01" class="form-control" id="subtotal"
                           name="subtotal" placeholder="0.00" oninput="calcFromSubtotal()">
                </div>
                <small class="text-muted">Enter subtotal to auto-calculate total</small>
            </div>
            <div class="col-md-4 mb-3" id="taxAmountDisplay" style="display:none;">
                <label class="form-label fw-bold">Tax Amount</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" step="0.01" class="form-control" id="tax_amount"
                           name="tax_amount" placeholder="0.00" readonly>
                </div>
                <small class="text-muted" id="taxRateLabel"></small>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="source_id" class="form-label fw-bold">Source</label>
                <div class="input-group">
                    <select class="form-control" id="source_id" name="source_id" required>
                        <option value="">Select Source...</option>
                        {% for source in sources %}
                        <option value="{{ source.id }}">{{ source.name }}</option>
                        {% endfor %}
                    </select>
                    <button type="button" class="btn btn-success" onclick="quickAddSource()">+</button>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <label for="category_id" class="form-label fw-bold">Category</label>
                <div class="input-group">
                    <select class="form-control" id="category_id" name="category_id" required>
                        <option value="">Select Category...</option>
                        {% for category in categories %}
                        <option value="{{ category.id }}" data-category-id="{{ category.id }}">
                            {{ category.name }}
                        </option>
                        {% endfor %}
                    </select>
                    <button type="button" class="btn btn-success" onclick="quickAddCategory()">+</button>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="subcategory_id" class="form-label fw-bold">Subcategory (Optional)</label>
                <div class="input-group">
                    <select class="form-control" id="subcategory_id" name="subcategory_id">
                        <option value="">None</option>
                        {% for sub in subcategories %}
                        <option value="{{ sub.id }}" data-category="{{ sub.category_id }}" style="display:none;">
                            {{ sub.name }}
                        </option>
                        {% endfor %}
                    </select>
                    <button type="button" class="btn btn-success" onclick="quickAddSubcategory()">+</button>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <label for="vendor_id" class="form-label fw-bold">Vendor (Optional)</label>
                <div class="input-group">
                    <select class="form-control" id="vendor_id" name="vendor_id">
                        <option value="">None</option>
                        {% for vendor in vendors %}
                        <option value="{{ vendor.id }}">{{ vendor.name }}</option>
                        {% endfor %}
                    </select>
                    <button type="button" class="btn btn-success" onclick="quickAddVendor()">+</button>
                </div>
            </div>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label fw-bold">Description</label>
            <input type="text" class="form-control" id="description" name="description"
                   placeholder="Optional description">
        </div>

        <div class="mb-3">
            <label for="notes" class="form-label fw-bold">Notes</label>
            <textarea class="form-control" id="notes" name="notes" rows="2"
                      placeholder="Optional notes"></textarea>
        </div>

        <!-- Receipt Section -->
        <div class="card mb-4 border-secondary">
            <div class="card-header fw-bold text-muted">📷 Receipt (Optional)</div>
            <div class="card-body">
                <input type="file" id="receiptInput" name="receipt" accept="image/*" capture="environment"
                       style="display:none;" onchange="previewReceipt(this)">

                <div class="d-flex gap-2 align-items-center flex-wrap">
                    <button type="button" class="btn btn-outline-secondary"
                            onclick="document.getElementById('receiptInput').click()">
                        📷 Take Photo / Choose File
                    </button>
                    <span id="receiptFileName" class="text-muted small">No receipt attached</span>
                    <button type="button" class="btn btn-outline-danger btn-sm" id="clearReceiptBtn"
                            style="display:none;" onclick="clearReceipt()">✕ Remove</button>
                </div>

                <!-- Preview -->
                <div id="receiptPreview" class="mt-3" style="display:none;">
                    <img id="previewImg" src="" class="img-fluid rounded"
                         style="max-height:200px; border:1px solid #dee2e6;">
                </div>
            </div>
        </div>

        <div class="d-grid gap-2 d-md-flex">
            <button type="submit" class="btn btn-primary btn-lg">Add Expense</button>
            <a href="{{ url_for('view_expenses') }}" class="btn btn-secondary btn-lg">Cancel</a>
        </div>
    </form>
</div>

<script>
// Filter subcategories based on selected category
document.getElementById('category_id').addEventListener('change', function() {
    const categoryId = this.value;
    const subcategorySelect = document.getElementById('subcategory_id');
    const options = subcategorySelect.querySelectorAll('option[data-category]');
    subcategorySelect.value = '';
    options.forEach(opt => opt.style.display = 'none');
    if (categoryId) {
        options.forEach(opt => {
            if (opt.getAttribute('data-category') === categoryId) opt.style.display = 'block';
        });
    }
});

// Receipt preview
function previewReceipt(input) {
    if (input.files && input.files[0]) {
        const file = input.files[0];
        document.getElementById('receiptFileName').textContent = file.name;
        document.getElementById('clearReceiptBtn').style.display = 'inline-block';
        const reader = new FileReader();
        reader.onload = e => {
            document.getElementById('previewImg').src = e.target.result;
            document.getElementById('receiptPreview').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
}

function clearReceipt() {
    document.getElementById('receiptInput').value = '';
    document.getElementById('receiptFileName').textContent = 'No receipt attached';
    document.getElementById('clearReceiptBtn').style.display = 'none';
    document.getElementById('receiptPreview').style.display = 'none';
    document.getElementById('previewImg').src = '';
}

// Tax calculation
function calcTax() {
    const total = parseFloat(document.getElementById('amount').value) || 0;
    const rateSelect = document.getElementById('tax_rate_id');
    const selectedOption = rateSelect.options[rateSelect.selectedIndex];
    const rate = parseFloat(selectedOption ? selectedOption.getAttribute('data-rate') : 0) || 0;

    if (rate > 0) {
        document.getElementById('taxBreakdown').style.display = 'block';
        document.getElementById('taxAmountDisplay').style.display = 'block';
        document.getElementById('taxRateLabel').textContent = rate + '% tax rate';

        if (total > 0) {
            // Calculate backwards from total
            const subtotal = total / (1 + rate / 100);
            const taxAmt   = total - subtotal;
            document.getElementById('subtotal').value   = subtotal.toFixed(2);
            document.getElementById('tax_amount').value = taxAmt.toFixed(2);
        }
    } else {
        document.getElementById('taxBreakdown').style.display = 'none';
        document.getElementById('taxAmountDisplay').style.display = 'none';
        document.getElementById('subtotal').value   = '';
        document.getElementById('tax_amount').value = '';
    }
}

function calcFromSubtotal() {
    const subtotal = parseFloat(document.getElementById('subtotal').value) || 0;
    const rateSelect = document.getElementById('tax_rate_id');
    const selectedOption = rateSelect.options[rateSelect.selectedIndex];
    const rate = parseFloat(selectedOption ? selectedOption.getAttribute('data-rate') : 0) || 0;

    if (subtotal > 0 && rate > 0) {
        const taxAmt = subtotal * (rate / 100);
        const total  = subtotal + taxAmt;
        document.getElementById('tax_amount').value = taxAmt.toFixed(2);
        document.getElementById('amount').value     = total.toFixed(2);
    }
}

// Quick Add functions
function quickAddSource() {
    const name = prompt('Enter new source name:');
    if (name && name.trim()) {
        fetch('{{ url_for("quick_add_source") }}', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: 'name=' + encodeURIComponent(name)
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                const select = document.getElementById('source_id');
                const option = document.createElement('option');
                option.value = data.id; option.textContent = data.name; option.selected = true;
                select.appendChild(option);
            }
        });
    }
}

function quickAddCategory() {
    const name = prompt('Enter new category name:');
    if (name && name.trim()) {
        fetch('{{ url_for("quick_add_category") }}', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: 'name=' + encodeURIComponent(name)
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                const select = document.getElementById('category_id');
                const option = document.createElement('option');
                option.value = data.id; option.textContent = data.name; option.selected = true;
                select.appendChild(option);
            }
        });
    }
}

function quickAddVendor() {
    const name = prompt('Enter new vendor name:');
    if (name && name.trim()) {
        fetch('{{ url_for("quick_add_vendor") }}', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: 'name=' + encodeURIComponent(name)
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                const select = document.getElementById('vendor_id');
                const option = document.createElement('option');
                option.value = data.id; option.textContent = data.name; option.selected = true;
                select.appendChild(option);
            }
        });
    }
}

function quickAddSubcategory() {
    const categoryId = document.getElementById('category_id').value;
    if (!categoryId) { alert('Please select a category first'); return; }
    const name = prompt('Enter new subcategory name:');
    if (name && name.trim()) {
        fetch('{{ url_for("quick_add_subcategory") }}', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: 'name=' + encodeURIComponent(name) + '&category_id=' + categoryId
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                const select = document.getElementById('subcategory_id');
                const option = document.createElement('option');
                option.value = data.id; option.textContent = data.name;
                option.setAttribute('data-category', categoryId);
                option.style.display = 'block'; option.selected = true;
                select.appendChild(option);
            }
        });
    }
}
</script>
{% endblock %}
