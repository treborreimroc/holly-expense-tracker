{% extends "base.html" %}

{% block title %}Edit Income{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Edit Income</h2>

    <form method="POST" class="mt-4">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="date" class="form-label fw-bold">Date</label>
                <input type="date" class="form-control" id="date" name="date"
                       value="{{ income.date }}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label for="amount" class="form-label fw-bold">Amount ($)</label>
                <input type="number" step="0.01" class="form-control" id="amount" name="amount"
                       value="{{ income.amount }}" required>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="source_id" class="form-label fw-bold">Source (Account)</label>
                <select class="form-control" id="source_id" name="source_id">
                    <option value="">Select Source...</option>
                    {% for source in sources %}
                    <option value="{{ source.id }}" {% if source.id == income.source_id %}selected{% endif %}>
                        {{ source.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label for="category_id" class="form-label fw-bold">Income Category</label>
                <div class="input-group">
                    <select class="form-control" id="category_id" name="category_id">
                        <option value="">Select Category...</option>
                        {% for cat in income_categories %}
                        <option value="{{ cat.id }}" {% if cat.id == income.category_id %}selected{% endif %}>
                            {{ cat.name }}
                        </option>
                        {% endfor %}
                    </select>
                    <button type="button" class="btn btn-success" onclick="quickAddIncomeCategory()">+</button>
                </div>
            </div>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label fw-bold">Description</label>
            <input type="text" class="form-control" id="description" name="description"
                   value="{{ income.description or '' }}">
        </div>

        <div class="mb-3">
            <label for="notes" class="form-label fw-bold">Notes</label>
            <textarea class="form-control" id="notes" name="notes" rows="3">{{ income.notes or '' }}</textarea>
        </div>

        <div class="d-grid gap-2 d-md-flex">
            <button type="submit" class="btn btn-primary btn-lg">Save Changes</button>
            <a href="{{ url_for('view_income') }}" class="btn btn-secondary btn-lg">Cancel</a>
        </div>
    </form>
</div>

<script>
function quickAddIncomeCategory() {
    const name = prompt('Enter new income category name:');
    if (name && name.trim()) {
        fetch('{{ url_for("quick_add_income_category") }}', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: 'name=' + encodeURIComponent(name)
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                const select = document.getElementById('category_id');
                const option = document.createElement('option');
                option.value = data.id;
                option.textContent = data.name;
                option.selected = true;
                select.appendChild(option);
            }
        });
    }
}
</script>
{% endblock %}
