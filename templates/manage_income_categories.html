{% extends "base.html" %}
{% block title %}Manage Income Categories{% endblock %}
{% block content %}
<div class="container mt-4">
    <h2>Manage Income Categories</h2>

    <div class="card mt-4">
        <div class="card-header">Add New Income Category</div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('add_income_category') }}">
                <div class="row">
                    <div class="col-md-6">
                        <input type="text" name="name" class="form-control" placeholder="Category Name" required>
                    </div>
                    <div class="col-md-4">
                        <input type="color" name="color" class="form-control" value="#28a745">
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-success w-100">Add</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <table class="table table-striped mt-4">
        <thead>
            <tr><th>Name</th><th>Color</th><th>Actions</th></tr>
        </thead>
        <tbody>
            {% for cat in income_categories %}
            <tr>
                <td>{{ cat.name }}</td>
                <td><span class="badge" style="background-color: {{ cat.color }}">{{ cat.color }}</span></td>
                <td>
                    <form method="POST" action="{{ url_for('delete_income_category', category_id=cat.id) }}"
                          style="display:inline;" onsubmit="return confirm('Delete this category?')">
                        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <a href="{{ url_for('manage') }}" class="btn btn-secondary">Back to Admin</a>
</div>
{% endblock %}
